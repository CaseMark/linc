name: Upstream Pi Review

on:
  workflow_dispatch:
  schedule:
    - cron: "23 15 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  upstream-pi-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate upstream report
        id: report
        run: node scripts/upstream-pi-report.mjs --output upstream-pi-report.md

      - name: Create or update tracking issue
        if: steps.report.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('upstream-pi-report.md', 'utf8');
            const base = '${{ steps.report.outputs.base }}'.slice(0, 8);
            const head = '${{ steps.report.outputs.upstream_head }}'.slice(0, 8);
            const title = `Upstream Pi review: ${base}..${head}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title.startsWith('Upstream Pi review:') && !issue.pull_request);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
