name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to release, such as 0.79.0. Leave empty to use bump.'
        required: false
        type: string
      bump:
        description: 'Semver bump to use when version is empty.'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          !startsWith(github.event.head_commit.message, 'Release v') &&
          github.event.head_commit.message != 'Add [Unreleased] section for next cycle'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate release ref
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases must be run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release target
        id: target
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          INPUT_BUMP: ${{ inputs.bump || 'patch' }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            echo "value=${INPUT_VERSION}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${INPUT_BUMP}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare release commits and tag
        run: node scripts/release.mjs "${{ steps.target.outputs.value }}"

      - name: Summary
        run: |
          VERSION="$(node -p "require('./packages/coding-agent/package.json').version")"
          {
            echo "## Release prepared"
            echo
            echo "- Version: v${VERSION}"
            echo "- The pushed tag starts the Build Binaries and npm Publish workflows."
            echo "- npm publishing still requires the npm-publish environment approval."
          } >> "${GITHUB_STEP_SUMMARY}"
