name: Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump or exact version: patch, minor, major, or x.y.z"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release
        run: node scripts/prepare-release.mjs "${{ inputs.version }}"

      - name: Read release version
        id: version
        run: echo "version=$(node -p "require('./packages/coding-agent/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify release
        run: npm run check

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json packages/*/package.json packages/*/CHANGELOG.md
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"
