name: NPM Publish Check

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/npm-publish-check.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/npm-publish-check.yml"
  workflow_dispatch:

concurrency:
  group: npm-publish-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish dry run
        run: npm run publish:dry
