name: NPM Publish Check

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/npm-publish-check.yml"
  push:
    branches: [main, dev]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/npm-publish-check.yml"
  workflow_dispatch:

concurrency:
  group: npm-publish-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check published version
        id: published
        run: |
          LOCAL_VERSION="$(node -p "require('./packages/coding-agent/package.json').version")"
          PUBLISHED_VERSION="$(npm view @casemark/linc version 2>/dev/null || true)"
          echo "local=${LOCAL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "published=${PUBLISHED_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish dry run
        if: steps.published.outputs.local != steps.published.outputs.published
        run: npm run publish:dry

      - name: Skip published version
        if: steps.published.outputs.local == steps.published.outputs.published
        run: echo "Version ${{ steps.published.outputs.local }} is already published; skipping npm publish dry run."
